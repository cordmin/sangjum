<!DOCTYPE html>
<html lang="ko">
<head>
    <script>
        var userAgent = navigator.userAgent.toLowerCase();
        if (userAgent.indexOf("kakaotalk") > -1) {
            var targetUrl = location.href;
            
            // 🌟 안드로이드, 아이폰 구분 없이 스마트폰에 설정된 '기본 브라우저(삼성인터넷, 크롬 등)'로 튕겨내는 만능 코드!
            location.href = 'kakaotalk://web/openExternal?url=' + encodeURIComponent(targetUrl);

            // 만약 카카오톡이 끝내 안 보내줄 경우를 대비한 수동 안내문
            document.write(
                '<!DOCTYPE html><html lang="ko"><head><meta name="viewport" content="width=device-width, initial-scale=1.0"></head>' +
                '<body style="margin:0; display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh; background-color:#FDF8F2; font-family:\'Noto Sans KR\', sans-serif; text-align:center; padding: 20px;">' +
                '<div style="font-size:50px; margin-bottom:16px;">🚧</div>' +
                '<h2 style="color:#3D2B1F; font-size:22px; font-weight:900; margin:0 0 12px 0;">카카오톡에서는 상점 부여가 제한됩니다!</h2>' +
                '<p style="color:#6B5247; font-size:16px; margin:0 0 30px 0; line-height:1.6; word-break:keep-all;">안전한 데이터 전송을 위해 기본 브라우저를 이용해주세요.<br><br>👉 화면 우측 하단(또는 상단)의 <b>[ ⋮ ] 또는 [ ⋯ ] 메뉴</b>를 누른 후<br><b style="color:#C4704A;">[다른 브라우저로 열기]</b>를 선택해주세요!</p>' +
                '<div style="background-color:#F5DDD2; color:#C4704A; padding:12px 24px; border-radius:20px; font-weight:bold; font-size:14px;">현재 이 카카오톡 창은 닫아주세요 (X)</div>' +
                '</body></html>'
            );
            document.close();
            window.stop(); 
        }
    </script>
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <title>2학년 상점 톡톡(2026)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #FDF8F2; color: #3D2B1F; touch-action: manipulation; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .student-card { transition: all 0.15s ease; border: 2px solid #E5E7EB; cursor: pointer; }
        .student-card.selected { background-color: #F5DDD2; border-color: #C4704A; transform: translateY(-2px); box-shadow: 0 4px 12px rgba(196,112,74,0.2); }
        .action-chip { transition: transform 0.1s; cursor: pointer; }
        .action-chip:active { transform: scale(0.95); }
        .spinner { border: 4px solid rgba(196,112,74,0.2); border-left-color: #C4704A; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .modal-enter { opacity: 0; transform: scale(0.9); }
        .modal-enter-active { opacity: 1; transform: scale(1); transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .modal-leave { opacity: 1; transform: scale(1); }
        .modal-leave-active { opacity: 0; transform: scale(0.9); transition: all 0.15s cubic-bezier(0.4, 0, 0.2, 1); }
        
        .tab-btn.active { color: #C4704A; border-top: 3px solid #C4704A; background-color: #FDF8F2; }

        /* 🌟 복구됨: 선생님 이름 플라잉 애니메이션용 CSS */
        @keyframes wave { 0%, 100% { transform: rotate(0deg); } 25% { transform: rotate(-15deg); } 75% { transform: rotate(15deg); } }
        .fly-away {
            top: 40px !important; 
            left: calc(100% - 70px) !important; 
            transform: translate(-50%, -50%) scale(0.05) !important;
            opacity: 0 !important;
        }
        .highlight-input { border-color: #C4704A !important; background-color: #FDF8F2 !important; transform: scale(1.1); color: #C4704A !important; }
    </style>
</head>
<body class="flex flex-col h-[100dvh] overflow-hidden relative">

    <div id="loadingOverlay" class="absolute inset-0 bg-[#FDF8F2] z-50 flex flex-col items-center justify-center">
        <div class="spinner mb-4"></div>
        <div class="text-[#6B5247] font-bold">학생 명단 동기화 중...</div>
    </div>

    <div class="fixed inset-0 bg-[#3D2B1F]/60 backdrop-blur-sm z-[100] flex items-center justify-center transition-opacity duration-500" id="nameOverlay" style="display: none;"></div>
    <div class="fixed bg-white w-[85%] max-w-sm p-6 rounded-3xl shadow-2xl text-center z-[110] transition-all duration-700 ease-[cubic-bezier(0.4,0,0.2,1)]" id="nameModal" style="display: none; left: 50%; top: 50%; transform: translate(-50%, -50%) scale(1); opacity: 1;">
        <div class="text-[45px] mb-2 inline-block origin-bottom animate-[wave_2s_infinite]">👋</div>
        <h3 class="text-xl font-black text-[#3D2B1F] mb-2">환영합니다 선생님!</h3>
        <p class="text-[15px] text-[#6B5247] mb-5 leading-relaxed break-keep">원활한 상점 부여를 위해<br><b>선생님 성함</b>을 먼저 입력해주세요.<br>(한 번만 입력하면 자동으로 기억합니다)</p>
        <input type="text" id="firstTeacherInput" class="w-full p-3 border-2 border-[#EADDCD] rounded-xl text-center font-bold text-[#3D2B1F] mb-4 outline-none focus:border-[#C4704A] bg-[#FDF8F2] focus:bg-white transition-colors" placeholder="예: 홍길동">
        <button onclick="saveFirstTeacherName()" class="w-full p-3.5 bg-[#C4704A] text-white rounded-xl font-bold text-base shadow-[0_4px_10px_rgba(196,112,74,0.3)] active:scale-95 transition-transform">시작하기 🚀</button>
    </div>

    <header class="px-6 py-4 bg-white border-b border-[#E5E7EB] shadow-sm z-20 flex justify-between items-center shrink-0">
        <h1 class="text-xl font-black text-[#C4704A]">✨ 2학년 상점 톡톡</h1>
        <input type="text" id="teacherName" placeholder="선생님 성함 입력" class="w-32 p-2 bg-[#F5EFE6] rounded-lg text-center text-sm font-bold text-[#6B5247] outline-none transition-all duration-300">
    </header>

    <div id="classTabContainer" class="bg-white border-b border-[#E5E7EB] shrink-0 z-10">
        <div class="flex overflow-x-auto p-3 gap-2 no-scrollbar" id="classTabs"></div>
    </div>

    <main class="flex-1 overflow-y-auto p-6 bg-[#FDF8F2] relative pb-[180px]">
        
        <section id="view-give">
            <div class="flex justify-between items-end mb-3">
                <h2 class="text-lg font-black" id="currentClassLabel">명단 불러오는 중...</h2>
                <span class="text-[13px] font-bold text-[#9C8880]">다중 선택 가능</span>
            </div>
            <div class="grid grid-cols-3 sm:grid-cols-4 md:grid-cols-6 gap-2 sm:gap-3" id="studentGrid"></div>
        </section>

        <section id="view-stats" class="hidden">
            <h2 class="text-lg font-black mb-4" id="statsTitle">학급별 누적 순위</h2>
            <div id="statsList" class="flex flex-col gap-2"></div>
        </section>

        <section id="view-history" class="hidden">
            <h2 class="text-lg font-black mb-1 text-[#C4704A]">오늘 상점 기록</h2>
            <p class="text-xs font-bold text-[#9C8880] mb-4">※ 선생님께서 오늘 기록한 내역만 수정가능합니다.</p>
            <div id="historyList" class="flex flex-col gap-3"></div>
        </section>

    </main>

    <footer id="giveControls" class="fixed bottom-[64px] left-0 right-0 bg-white border-t border-[#E5E7EB] px-3 py-2 sm:p-3 shadow-[0_-4px_20px_rgba(0,0,0,0.05)] z-20">
        <div class="max-w-4xl mx-auto">
            <div class="flex justify-center gap-1 sm:gap-2 w-full">
                <button onclick="openConfirmModal('환경미화', 1)" class="action-chip flex-1 justify-center bg-[#6B8F71] text-white py-2.5 rounded-xl font-bold flex items-center shadow-sm text-[12px] sm:text-sm">환경미화</button>
                <button onclick="openConfirmModal('학습태도', 1)" class="action-chip flex-1 justify-center bg-[#5B8FB9] text-white py-2.5 rounded-xl font-bold flex items-center shadow-sm text-[12px] sm:text-sm">학습태도</button>
                <button onclick="openConfirmModal('신고정신', 1)" class="action-chip flex-1 justify-center bg-[#E8956C] text-white py-2.5 rounded-xl font-bold flex items-center shadow-sm text-[12px] sm:text-sm">신고정신</button>
                <button onclick="openConfirmModal('선행모범', 1)" class="action-chip flex-1 justify-center bg-[#A884C4] text-white py-2.5 rounded-xl font-bold flex items-center shadow-sm text-[12px] sm:text-sm">선행모범</button>
            </div>
        </div>
    </footer>

    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-[#E5E7EB] flex h-[64px] z-30 shadow-lg">
        <button onclick="switchView('give')" id="tab-give" class="tab-btn flex-1 flex flex-col items-center justify-center gap-1 active text-gray-400">
            <span class="text-xl">🎁</span><span class="text-[11px] font-bold">상점 부여</span>
        </button>
        <button onclick="switchView('stats')" id="tab-stats" class="tab-btn flex-1 flex flex-col items-center justify-center gap-1 text-gray-400">
            <span class="text-xl">📊</span><span class="text-[11px] font-bold">누적 통계</span>
        </button>
        <button onclick="switchView('history')" id="tab-history" class="tab-btn flex-1 flex flex-col items-center justify-center gap-1 text-gray-400">
            <span class="text-xl">✍️</span><span class="text-[11px] font-bold">기록 삭제</span>
        </button>
    </nav>

    <div id="customModal" class="hidden fixed inset-0 z-[60] flex items-center justify-center">
        <div class="absolute inset-0 bg-black/20 backdrop-blur-sm" onclick="closeConfirmModal()"></div>
        <div id="modalContent" class="modal-enter relative bg-white rounded-2xl shadow-xl w-[90%] max-w-sm p-6 flex flex-col gap-4">
            <div class="flex items-center gap-2 mb-1">
                <span class="text-2xl">🎁</span>
                <h3 class="text-lg font-black text-[#3D2B1F]">상점 부여 확인</h3>
            </div>
            
            <div class="bg-[#FDF8F2] rounded-xl p-4 text-[#6B5247] text-[15px] leading-relaxed">
                <p id="modalMessage" class="mb-4 text-center"></p>
                
                <div class="flex justify-center items-center gap-4 bg-white p-2 rounded-xl border border-[#EADDCD] mx-auto w-fit shadow-sm">
                    <button onclick="changeMeritCount(-1)" class="w-12 h-10 flex items-center justify-center bg-[#F5EFE6] text-[#6B5247] rounded-lg font-black text-xl active:scale-90 transition-transform">➖</button>
                    <span id="meritCountDisplay" class="font-black text-xl text-[#C4704A] w-14 text-center">1개</span>
                    <button onclick="changeMeritCount(1)" class="w-12 h-10 flex items-center justify-center bg-[#F5EFE6] text-[#6B5247] rounded-lg font-black text-xl active:scale-90 transition-transform">➕</button>
                </div>
            </div>

            <div class="flex gap-2 mt-2">
                <button onclick="closeConfirmModal()" class="flex-1 py-3 rounded-xl font-bold bg-[#F5EFE6] text-[#6B5247] hover:bg-[#EBE2D5] transition-colors">취소</button>
                <button onclick="executeGiveMerit()" class="flex-1 py-3 rounded-xl font-bold bg-[#C4704A] text-white hover:bg-[#B36039] transition-colors shadow-sm">확인</button>
            </div>
        </div>
    </div>

    <div id="toast" class="hidden fixed bottom-[180px] left-1/2 transform -translate-x-1/2 bg-[#3D2B1F] text-white px-8 py-4 rounded-2xl font-black text-base shadow-2xl z-[70] transition-opacity text-center whitespace-nowrap">
        처리 중...
    </div>

    <script>
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzZPqYRPvoLo_NIjCaqYuWDVI8cU6NYt6Wbqr5z5GNUIaUkX2GQ_vkOoSngeW-sJ8xs/exec";

        let classData = {};
        let currentClass = '';
        let selectedStudents = new Set();
        let pendingMeritData = null;
        let currentMeritCount = 1;

        window.onload = function() {
            // 🚀 가장 먼저 출발 (동기화 속도 최적화 유지)
            fetch(WEB_APP_URL + "?action=getStudentData")
                .then(res => res.json())
                .then(data => {
                    classData = data;
                    const sortedClasses = Object.keys(classData).sort((a, b) => parseInt(a) - parseInt(b));
                    if(sortedClasses.length > 0) {
                        currentClass = sortedClasses[0];
                        renderTabs();
                        renderStudents(currentClass);
                    }
                    document.getElementById('loadingOverlay').style.display = 'none';
                })
                .catch(error => {
                    document.getElementById('loadingOverlay').innerHTML = `<div class="text-center p-6 bg-white rounded-2xl shadow-lg border border-red-200"><div class="text-3xl mb-2">⚠️</div><div class="text-red-500 font-bold mb-2">데이터 연동 실패!</div><div class="text-sm font-normal text-gray-600">앱스스크립트 URL과 권한을 확인해주세요.</div></div>`;
                });

            // 👤 서버가 일하는 동안 모달 애니메이션 준비 (동시 진행)
            const savedTeacher = localStorage.getItem("teacherName");
            if(savedTeacher) {
                document.getElementById('teacherName').value = savedTeacher;
            } else {
                document.getElementById('nameOverlay').style.display = 'flex';
                document.getElementById('nameModal').style.display = 'block';
            }
        };

        function saveFirstTeacherName() {
            const name = document.getElementById('firstTeacherInput').value.trim() || '선생님';
            const modal = document.getElementById('nameModal');
            const overlay = document.getElementById('nameOverlay');
            const targetInput = document.getElementById('teacherName');

            overlay.style.opacity = '0';
            modal.classList.add('fly-away');

            setTimeout(() => {
                overlay.style.display = 'none';
                modal.style.display = 'none';
                targetInput.value = name;
                localStorage.setItem("teacherName", name);
                
                targetInput.classList.add('highlight-input');
                setTimeout(() => targetInput.classList.remove('highlight-input'), 800);
            }, 600);
        }

        function switchView(view) {
            document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`view-${view}`).classList.remove('hidden');
            document.getElementById(`tab-${view}`).classList.add('active');

            const giveControls = document.getElementById('giveControls');
            const classContainer = document.getElementById('classTabContainer');
            const sortedClasses = Object.keys(classData).sort((a, b) => parseInt(a) - parseInt(b));

            if(view === 'give') {
                if (currentClass === '전체') {
                    currentClass = sortedClasses[0] || '';
                }
                giveControls.classList.remove('hidden');
                classContainer.classList.remove('hidden');
                renderTabs();
                renderStudents(currentClass);
            } else if(view === 'stats') {
                giveControls.classList.add('hidden');
                classContainer.classList.remove('hidden');
                renderTabs();
                loadStats();
            } else {
                giveControls.classList.add('hidden');
                classContainer.classList.add('hidden');
                loadHistory();
            }
        }

        function renderTabs() {
            const tabsDiv = document.getElementById('classTabs');
            tabsDiv.innerHTML = '';
            
            const isStatsActive = !document.getElementById('view-stats').classList.contains('hidden');
            const sortedClasses = Object.keys(classData).sort((a, b) => parseInt(a) - parseInt(b));
            
            let tabList = [...sortedClasses];
            if (isStatsActive) {
                tabList.unshift("전체");
            }
            
            tabList.forEach(cls => {
                const btn = document.createElement('button');
                const isActive = cls === currentClass;
                btn.className = `shrink-0 px-5 py-2.5 rounded-full font-bold text-sm transition-colors ${isActive ? 'bg-[#3D2B1F] text-white' : 'bg-[#F5EFE6] text-[#6B5247]'}`;
                btn.textContent = cls;
                btn.onclick = () => {
                    currentClass = cls;
                    selectedStudents.clear();
                    renderTabs();
                    if(!document.getElementById('view-give').classList.contains('hidden')) renderStudents(cls);
                    else if (!document.getElementById('view-stats').classList.contains('hidden')) loadStats();
                };
                tabsDiv.appendChild(btn);
            });
        }

        function renderStudents(cls) {
            if(!cls || !classData[cls]) return;
            document.getElementById('currentClassLabel').textContent = `${cls} 명단`;
            const grid = document.getElementById('studentGrid');
            grid.innerHTML = '';
            classData[cls].forEach(student => {
                const card = document.createElement('div');
                const isSelected = selectedStudents.has(student.name);
                card.className = `student-card bg-white rounded-xl p-2 flex flex-col items-center justify-center h-16 shadow-sm ${isSelected ? 'selected' : ''}`;
                card.innerHTML = `<span class="text-[13px] text-[#9C8880] font-bold">${student.num}번</span><span class="text-[16px] font-black text-[#3D2B1F] leading-tight mt-0.5">${student.name}</span>`;
                card.onclick = () => {
                    if(selectedStudents.has(student.name)) { selectedStudents.delete(student.name); card.classList.remove('selected'); } 
                    else { selectedStudents.add(student.name); card.classList.add('selected'); }
                };
                grid.appendChild(card);
            });
        }

        function loadStats() {
            const list = document.getElementById('statsList');
            
            if (currentClass === '전체') {
                document.getElementById('statsTitle').textContent = `반별 누적 순위`;
                list.innerHTML = '<div class="text-center py-10 font-bold text-gray-500">데이터를 분석 중입니다...</div>';
                
                fetch(WEB_APP_URL + "?action=getStatsData")
                    .then(res => res.json())
                    .then(stats => {
                        list.innerHTML = '';
                        
                        const classMap = {};
                        Object.keys(classData).forEach(cls => {
                            const num = cls.replace('반', '');
                            classMap[num] = 0;
                        });
                        
                        stats.forEach(s => {
                            const num = s.classNum.toString();
                            if (classMap[num] !== undefined) {
                                classMap[num] += s.total;
                            } else {
                                classMap[num] = s.total;
                            }
                        });
                        
                        const classStats = Object.keys(classMap).map(num => ({
                            classNum: num,
                            total: classMap[num]
                        })).sort((a, b) => b.total - a.total);
                        
                        if(classStats.length === 0) {
                            list.innerHTML = '<div class="text-center py-10 text-gray-400">학급별 데이터가 존재하지 않습니다.</div>';
                            return;
                        }
                        
                        classStats.forEach((s, idx) => {
                            const item = document.createElement('div');
                            
                            let rankIcon = `${idx + 1}위`;
                            let itemStyle = "";
                            let rankColorClass = "text-[#64748b]";
                            
                            if (idx === 0) {
                                rankIcon = "🥇 1위";
                                itemStyle = "background-color: rgba(241, 196, 15, 0.08); border-color: rgba(241, 196, 15, 0.3);";
                                rankColorClass = "text-[#b78a00] text-[1.15rem]";
                            } else if (idx === 1) {
                                rankIcon = "🥈 2위";
                                itemStyle = "background-color: rgba(149, 165, 166, 0.1); border-color: rgba(149, 165, 166, 0.3);";
                                rankColorClass = "text-[#4a5568]";
                            } else if (idx === 2) {
                                rankIcon = "🥉 3위";
                                itemStyle = "background-color: rgba(230, 126, 34, 0.07); border-color: rgba(230, 126, 34, 0.2);";
                                rankColorClass = "text-[#a03d00]";
                            }
                            
                            item.className = 'bg-white p-4 rounded-xl flex justify-between items-center shadow-sm border border-[#e2e8f0]';
                            if (itemStyle) {
                                item.setAttribute('style', itemStyle);
                            }
                            
                            item.innerHTML = `
                                <div>
                                    <span class="font-black ${rankColorClass} mr-3">${rankIcon}</span>
                                    <span class="font-black text-[#1e293b] text-[1.1rem]">${s.classNum}반</span>
                                </div>
                                <div class="font-black text-lg text-[#475569]">${s.total}점</div>
                            `;
                            list.appendChild(item);
                        });
                    }).catch(() => {
                        list.innerHTML = '<div class="text-center py-10 text-red-400">통계를 불러오지 못했습니다.</div>';
                    });
                return;
            }
            
            document.getElementById('statsTitle').textContent = `${currentClass} 누적 순위`;
            list.innerHTML = '<div class="text-center py-10 font-bold text-gray-500">데이터를 분석 중입니다...</div>';
            
            fetch(WEB_APP_URL + "?action=getStatsData")
                .then(res => res.json())
                .then(stats => {
                    list.innerHTML = '';
                    const filtered = stats.filter(s => s.classNum == currentClass.replace('반','')).sort((a,b)=>b.total-a.total);
                    if(filtered.length === 0) { list.innerHTML = '<div class="text-center py-10 text-gray-400">부여된 상점이 없습니다.</div>'; return; }
                    filtered.forEach((s, idx) => {
                        const item = document.createElement('div');
                        item.className = 'bg-white p-4 rounded-xl flex justify-between items-center shadow-sm';
                        item.innerHTML = `<div><span class="font-bold text-[#C4704A] mr-2">${idx+1}위</span> <span class="font-black text-[#3D2B1F]">${s.name}</span></div>
                                          <div class="font-black text-lg text-[#3D2B1F]">${s.total}점</div>`;
                        list.appendChild(item);
                    });
                }).catch(() => { list.innerHTML = '<div class="text-center py-10 text-red-400">통계를 불러오지 못했습니다.</div>'; });
        }

        function loadHistory() {
            const list = document.getElementById('historyList');
            const teacher = document.getElementById('teacherName').value.trim();
            if(!teacher) { list.innerHTML = '<div class="text-center py-10 font-bold text-red-500">화면 상단에 선생님 성함을 먼저 입력해주세요!</div>'; return; }
            list.innerHTML = '<div class="text-center py-10 font-bold text-gray-500">기록을 불러오는 중입니다...</div>';
            
            fetch(WEB_APP_URL + "?action=getTodayLogs&teacherName=" + encodeURIComponent(teacher))
                .then(res => res.json())
                .then(history => {
                    list.innerHTML = '';
                    if(history.length === 0) { list.innerHTML = '<div class="text-center py-10 text-gray-400">오늘 선생님이 부여하신 기록이 없습니다.</div>'; return; }
                    history.forEach(h => {
                        const item = document.createElement('div');
                        item.className = 'bg-white p-4 rounded-xl shadow-sm border-l-4 border-[#C4704A] flex justify-between items-center';
                        item.innerHTML = `<div>
                            <div class="text-xs text-gray-400 mb-1">${h.timestamp} | ${h.teacher}</div>
                            <div class="font-bold text-[#3D2B1F]">${h.classNum}반 ${h.name} <span class="text-[#C4704A] ml-1">[${h.reason}]</span></div>
                        </div>
                        <button onclick="deleteLog('${h.rowId}')" class="bg-red-50 text-red-500 px-4 py-2 rounded-lg font-bold text-sm shrink-0">삭제</button>`;
                        list.appendChild(item);
                    });
                }).catch(() => { list.innerHTML = '<div class="text-center py-10 text-red-400">기록을 조회하지 못했습니다.</div>'; });
        }

        function deleteLog(rowId) {
            Swal.fire({
                title: '<span style="font-size: 20px;">기록을 삭제하시겠어요?</span>', text: "오늘 기록하신 내역만 지워집니다.", icon: 'warning',
                showCancelButton: true, confirmButtonColor: '#C4704A', cancelButtonColor: '#F5EFE6', confirmButtonText: '삭제하기', cancelButtonText: '<span style="color:#6B5247; font-weight:bold;">취소</span>',
                customClass: { popup: 'rounded-2xl' }
            }).then((result) => {
                if (result.isConfirmed) {
                    // 🚀 수정 유지됨: 0초 딜레이 '낙관적 UI' (응답 대기 없이 바로 화면에 완료 띄우기)
                    Swal.fire({ title: '삭제 완료!', text: '기록이 깔끔하게 지워졌습니다.', icon: 'success', confirmButtonColor: '#C4704A' }); 
                    
                    fetch(WEB_APP_URL, { method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'text/plain' }, body: JSON.stringify({ action: 'deleteLogByRowId', rowId: rowId }) });
                    
                    setTimeout(() => { loadHistory(); }, 500); // 0.5초 뒤 목록만 갱신
                }
            });
        }

        function clearSelection() { selectedStudents.clear(); renderStudents(currentClass); }

        function changeMeritCount(delta) {
            currentMeritCount += delta;
            if (currentMeritCount < 1) currentMeritCount = 1;
            
            document.getElementById('meritCountDisplay').textContent = currentMeritCount + '개';
            document.getElementById('dynamicCountText').textContent = currentMeritCount + '개';
        }

        function openConfirmModal(reason, score) {
            const teacher = document.getElementById('teacherName').value.trim();
            if(!teacher) { showToast("화면 상단에 선생님 성함을 입력해주세요!", true); return; }
            if(selectedStudents.size === 0) { showToast("학생을 먼저 선택해주세요!", true); return; }

            pendingMeritData = { reason, score, teacher };
            currentMeritCount = 1;
            document.getElementById('meritCountDisplay').textContent = '1개';

            const firstStudent = Array.from(selectedStudents)[0];
            const multiIndicator = selectedStudents.size > 1 ? ` 외 ${selectedStudents.size - 1}명` : '';
            const nameDisplay = `${firstStudent}${multiIndicator}`;

            document.getElementById('modalMessage').innerHTML = `<span class="font-black text-[#3D2B1F]">'${nameDisplay}'</span> 학생에게<br><span class="font-black text-[#C4704A]">[${reason}]</span> 상점을 <span class="font-black text-[#C4704A] underline decoration-2 underline-offset-4" id="dynamicCountText">1개</span> 부여하시겠습니까?`;
            
            const modal = document.getElementById('customModal');
            const content = document.getElementById('modalContent');
            modal.classList.remove('hidden');
            setTimeout(() => { content.classList.remove('modal-enter'); content.classList.add('modal-enter-active'); }, 10);
        }

        function closeConfirmModal() {
            const modal = document.getElementById('customModal'); const content = document.getElementById('modalContent');
            content.classList.remove('modal-enter-active'); content.classList.add('modal-leave-active');
            setTimeout(() => { modal.classList.add('hidden'); content.classList.remove('modal-leave-active'); content.classList.add('modal-enter'); pendingMeritData = null; }, 150);
        }

        function executeGiveMerit() {
            if(!pendingMeritData) return;
            const { reason, score, teacher } = pendingMeritData;
            closeConfirmModal();

            localStorage.setItem("teacherName", teacher);
            
            const finalScore = score * currentMeritCount;
            const finalReason = currentMeritCount > 1 ? `${reason} (${currentMeritCount}개)` : reason;

            const logs = Array.from(selectedStudents).map(name => ({
                classNum: currentClass.replace('반', ''), name: name, reason: finalReason, score: finalScore, teacher: teacher
            }));

            const firstStudent = Array.from(selectedStudents)[0];
            const multiIndicator = selectedStudents.size > 1 ? ` 외 ${selectedStudents.size - 1}명` : '';
            const nameDisplay = `${firstStudent}${multiIndicator}`;

            // 🌟 수정됨: 토스트 알림 대신 화면 중앙에 삭제 완료처럼 확실하게 뜨는 모달(SweetAlert2) 적용 (0초 딜레이)
            Swal.fire({
                title: '✨ 상점 부여 완료!',
                text: `${nameDisplay} 학생에게 상점이 기록되었습니다.`,
                icon: 'success',
                confirmButtonColor: '#C4704A',
                customClass: { popup: 'rounded-2xl' }
            });

            clearSelection(); 

            // 서버 응답 대기 안 함
            fetch(WEB_APP_URL, { method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'text/plain' }, body: JSON.stringify({ action: 'doPostData', logs: logs }) });
        }

        function showToast(msg, isError = false) {
            const toast = document.getElementById('toast');
            toast.textContent = msg; toast.style.backgroundColor = isError ? "#C4707A" : "#3D2B1F";
            toast.classList.remove('hidden'); setTimeout(() => toast.classList.add('hidden'), 2500);
        }
    </script>
</body>
</html>
